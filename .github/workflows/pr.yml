name: Pr

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Setup Tooling
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true
          experimental: true

      - name: Setup Project
        run: mise run setup

      - name: Lint and format check (repo-wide)
        run: mise run check

      - name: Typecheck, test, and build each package
        run: |
          for pkg in packages/*; do
            [ -f "$pkg/package.json" ] || continue
            echo "::group::$pkg"
            mise run typecheck --package "$pkg"
            mise run test --package "$pkg"
            mise run build --package "$pkg"
            echo "::endgroup::"
          done

  macos-pi-agents:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Setup Tooling
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true
          experimental: true

      - name: Setup, typecheck, test, and build pi-agents
        run: |
          mise run setup
          mise run typecheck --package packages/pi-agents
          mise run test --package packages/pi-agents
          mise run build --package packages/pi-agents

  windows-pi-agents:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck and test pi-agents
        working-directory: packages/pi-agents
        shell: pwsh
        run: |
          bunx tsc --noEmit
          bun test

      - name: Build pi-agents entry points
        working-directory: packages/pi-agents
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $externalArgs = @()
          $pkg.peerDependencies.PSObject.Properties.Name | ForEach-Object {
            $externalArgs += @("--external", $_)
          }
          $pkg.pi.external | ForEach-Object {
            $externalArgs += @("--external", $_)
          }

          bun build ./src/index.ts --outdir dist --target node @externalArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          bun build ./src/artifact-reader-extension.ts --outdir dist --target node @externalArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
